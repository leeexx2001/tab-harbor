      <circle cx="64" cy="64" r="56"/>
    </clipPath>
    <filter id="center-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#1f2a3a" flood-opacity="0.16"/>
    </filter>
  </defs>

  <circle cx="64" cy="64" r="58" fill="#ffffff"/>
  <circle cx="64" cy="64" r="56" fill="#f6f8fc" stroke="#dbe3ee" stroke-width="2"/>

  <g clip-path="url(#icon-clip)">
