<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Tab Harbor icon</title>
  <desc id="desc">A Google-inspired four-color roundel with stacked tabs at the center.</desc>

  <defs>
